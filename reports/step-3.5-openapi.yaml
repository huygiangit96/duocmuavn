openapi: 3.0.3
info:
  title: Duoc Mua API
  version: 1.0.0
  description: API for Duoc Mua agricultural e-commerce website.
paths:
  /api/account/addresses/:
    get:
      operationId: account_addresses_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - account
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAddressList'
          description: ''
    post:
      operationId: account_addresses_create
      tags:
      - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Address'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Address'
        required: true
      security:
      - FirebaseAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
          description: ''
  /api/account/addresses/{id}/:
    get:
      operationId: account_addresses_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - account
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
          description: ''
    put:
      operationId: account_addresses_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Address'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Address'
        required: true
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
          description: ''
    patch:
      operationId: account_addresses_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAddress'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAddress'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAddress'
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
          description: ''
    delete:
      operationId: account_addresses_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - account
      security:
      - FirebaseAuth: []
      responses:
        '204':
          description: No response body
  /api/account/profile/:
    get:
      operationId: account_profile_retrieve
      tags:
      - account
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: account_profile_update
      tags:
      - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfile'
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: account_profile_partial_update
      tags:
      - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/categories/:
    get:
      operationId: categories_list
      tags:
      - categories
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
          description: ''
  /api/config/:
    get:
      operationId: config_retrieve
      tags:
      - config
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteConfig'
          description: ''
  /api/contact/:
    post:
      operationId: contact_create
      tags:
      - contact
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactSubmission'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContactSubmission'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContactSubmission'
        required: true
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactSubmission'
          description: ''
  /api/documents/:
    get:
      operationId: documents_list
      parameters:
      - in: query
        name: category
        schema:
          type: string
      - in: query
        name: doc_type
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: plants
        schema:
          type: string
      - in: query
        name: search
        schema:
          type: string
      tags:
      - documents
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDocumentListList'
          description: ''
  /api/documents/{slug}/:
    get:
      operationId: documents_retrieve
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - documents
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
          description: ''
  /api/news/:
    get:
      operationId: news_list
      parameters:
      - in: query
        name: category
        schema:
          type: string
      - in: query
        name: hashtag
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
      tags:
      - news
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArticleListList'
          description: ''
  /api/news/{slug}/:
    get:
      operationId: news_retrieve
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - news
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetail'
          description: ''
  /api/orders/:
    get:
      operationId: orders_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - orders
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderDetailList'
          description: ''
    post:
      operationId: orders_create
      tags:
      - orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrderCreate'
        required: true
      security:
      - FirebaseAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreate'
          description: ''
  /api/orders/{order_number}/:
    get:
      operationId: orders_retrieve
      parameters:
      - in: path
        name: order_number
        schema:
          type: string
        required: true
      tags:
      - orders
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
          description: ''
  /api/orders/{order_number}/cancel/:
    post:
      operationId: orders_cancel_create
      parameters:
      - in: path
        name: order_number
        schema:
          type: string
        required: true
      tags:
      - orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrderDetail'
        required: true
      security:
      - FirebaseAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
          description: ''
  /api/plants/:
    get:
      operationId: plants_list
      tags:
      - plants
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plant'
          description: ''
  /api/products/:
    get:
      operationId: products_list
      parameters:
      - in: query
        name: category
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: plants
        schema:
          type: string
      - in: query
        name: search
        schema:
          type: string
      - in: query
        name: tag
        schema:
          type: string
      tags:
      - products
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductListList'
          description: ''
  /api/products/{slug}/:
    get:
      operationId: products_retrieve
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - products
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - FirebaseAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
components:
  schemas:
    Address:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        label:
          type: string
          maxLength: 80
        receiver_name:
          type: string
          maxLength: 150
        phone:
          type: string
          maxLength: 30
        address_line:
          type: string
        province:
          type: integer
          nullable: true
        province_detail:
          allOf:
          - $ref: '#/components/schemas/Province'
          readOnly: true
        commune:
          type: integer
          nullable: true
        commune_detail:
          allOf:
          - $ref: '#/components/schemas/Commune'
          readOnly: true
        is_default:
          type: boolean
      required:
      - address_line
      - commune_detail
      - id
      - label
      - phone
      - province_detail
      - receiver_name
    ArticleDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 240
        slug:
          type: string
          maxLength: 260
          pattern: ^[-a-zA-Z0-9_]+$
        category:
          allOf:
          - $ref: '#/components/schemas/NewsCategory'
          readOnly: true
        hashtags:
          type: array
          items:
            $ref: '#/components/schemas/Hashtag'
          readOnly: true
        thumbnail:
          type: string
          format: uri
        summary:
          type: string
          maxLength: 300
        author_name:
          type: string
          readOnly: true
        published_at:
          type: string
          format: date-time
          nullable: true
        view_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author_name
      - category
      - content
      - created_at
      - hashtags
      - id
      - slug
      - summary
      - title
      - updated_at
    ArticleList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 240
        slug:
          type: string
          maxLength: 260
          pattern: ^[-a-zA-Z0-9_]+$
        category:
          allOf:
          - $ref: '#/components/schemas/NewsCategory'
          readOnly: true
        hashtags:
          type: array
          items:
            $ref: '#/components/schemas/Hashtag'
          readOnly: true
        thumbnail:
          type: string
          format: uri
        summary:
          type: string
          maxLength: 300
        author_name:
          type: string
          readOnly: true
        published_at:
          type: string
          format: date-time
          nullable: true
        view_count:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - author_name
      - category
      - hashtags
      - id
      - slug
      - summary
      - title
    BlankEnum:
      enum:
      - ''
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        slug:
          type: string
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
        color:
          type: string
          maxLength: 32
        icon:
          type: string
          maxLength: 80
      required:
      - id
      - name
      - slug
    Commune:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 150
        province:
          allOf:
          - $ref: '#/components/schemas/Province'
          readOnly: true
      required:
      - code
      - id
      - name
      - province
    ContactSubmission:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        phone:
          type: string
          maxLength: 30
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        message:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - message
      - name
      - phone
    DocCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        slug:
          type: string
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
      - slug
    DocTypeEnum:
      enum:
      - paper
      - video
      type: string
      description: |-
        * `paper` - Paper
        * `video` - Video
    DocumentDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 240
        slug:
          type: string
          maxLength: 260
          pattern: ^[-a-zA-Z0-9_]+$
        doc_type:
          $ref: '#/components/schemas/DocTypeEnum'
        category:
          allOf:
          - $ref: '#/components/schemas/DocCategory'
          readOnly: true
        plants:
          type: array
          items:
            $ref: '#/components/schemas/Plant'
          readOnly: true
        thumbnail:
          type: string
          format: uri
        summary:
          type: string
          maxLength: 300
        file:
          type: string
          format: uri
          nullable: true
        video_url:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        created_at:
          type: string
          format: date-time
          readOnly: true
        content:
          type: string
        is_published:
          type: boolean
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category
      - created_at
      - doc_type
      - id
      - plants
      - slug
      - summary
      - title
      - updated_at
    DocumentList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 240
        slug:
          type: string
          maxLength: 260
          pattern: ^[-a-zA-Z0-9_]+$
        doc_type:
          $ref: '#/components/schemas/DocTypeEnum'
        category:
          allOf:
          - $ref: '#/components/schemas/DocCategory'
          readOnly: true
        plants:
          type: array
          items:
            $ref: '#/components/schemas/Plant'
          readOnly: true
        thumbnail:
          type: string
          format: uri
        summary:
          type: string
          maxLength: 300
        file:
          type: string
          format: uri
          nullable: true
        video_url:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category
      - created_at
      - doc_type
      - id
      - plants
      - slug
      - summary
      - title
    Hashtag:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 80
      required:
      - id
      - name
    NewsCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        slug:
          type: string
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
      - slug
    OrderCreate:
      type: object
      properties:
        order_number:
          type: string
          readOnly: true
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
        receiver_name:
          type: string
          maxLength: 150
        receiver_phone:
          type: string
          maxLength: 30
        receiver_address:
          type: string
        note:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderCreateItem'
          writeOnly: true
      required:
      - items
      - order_number
      - receiver_address
      - receiver_name
      - receiver_phone
    OrderCreateItem:
      type: object
      properties:
        product:
          type: integer
        quantity:
          type: integer
          minimum: 1
      required:
      - product
      - quantity
    OrderDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        order_number:
          type: string
          maxLength: 20
        status:
          $ref: '#/components/schemas/StatusEnum'
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
        payment_status:
          $ref: '#/components/schemas/PaymentStatusEnum'
        receiver_name:
          type: string
          maxLength: 150
        receiver_phone:
          type: string
          maxLength: 30
        receiver_address:
          type: string
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,0})?$
        shipping_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,0})?$
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,0})?$
        note:
          type: string
        vnpay_txn_ref:
          type: string
          nullable: true
          maxLength: 100
        momo_txn_ref:
          type: string
          nullable: true
          maxLength: 100
